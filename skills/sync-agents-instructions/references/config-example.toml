# sync-agents-instructions machine topology config.
# Default location: ~/.config/agent-instructions/sync-config.toml
# Every path may use ~ for the user home.

[workspace]
# Where project repos live (globs, evaluated non-recursively per entry).
project_globs = ["~/workspace/*"]
# Each independent project instruction surface is instead declared by its
# owning [[agents]] entry below. Do not add the legacy flat
# project_instruction_files field here.
# Files this skill must NEVER write or restructure (project workflow owners).
off_limits = ["**/docs/agents/**", "**/conventions/**"]
# Soft budget for the natively-injected surface (entry files + all
# load="always" sources, as expanded by the most eager agent).
inject_budget_lines = 300

# Shared instruction sources — the vertical slices of the user level.
# role  = what belongs here (the owner's split; the skill enforces it).
# domain = slice name; load = "always" (native inject) | "on-demand" (lazy
# trigger pointer in entry files: "when doing X, read Y").
[[shared_sources]]
path = "~/.config/agent-instructions/shared.md"
role = "volatile machine/infrastructure facts (ports, paths, endpoints)"
domain = "machine-facts"
load = "always"

[[shared_sources]]
path = "~/.config/agent-instructions/shared-behavior.md"
role = "stable agent-agnostic behavior contract (incl. seed sections for future slices, e.g. agent-assets routing)"
domain = "behavior"
load = "always"

# Example of an on-demand domain slice (create only when rules reach minimum
# mass — roughly >=5 rules or one cohesive theme):
# [[shared_sources]]
# path = "~/.config/agent-instructions/frontend.md"
# role = "cross-project frontend standards"
# domain = "frontend"
# load = "on-demand"

# One entry per AI agent on this machine. Each agent owns exactly one
# independent project instruction surface; its normalized owner path and name
# must be unique. Supporting a new agent is adding a complete entry here — the
# skill body never changes.
[[agents]]
name = "claude-code"
entry_file = "~/.claude/CLAUDE.md"
# Required, project-relative, and owned only by claude-code. This surface must
# not import, link to, defer to, or treat another owner's surface as authority.
project_instruction_file = "CLAUDE.md"
skill_dirs = ["~/.claude/skills"]
runtime_constructs = ["WebFetch", "Edit", "Write"]
# Claude Code natively expands @-imports: its injected surface = entry + all
# load="always" sources.

[[agents]]
name = "codex"
entry_file = "~/.codex/AGENTS.md"
# Required, project-relative, and owned only by codex. A sibling surface may
# show similar content, but it is ParallelProject evidence, never coverage.
project_instruction_file = "AGENTS.md"
agent_specific_file = "~/.codex/INSTRUCTION.md"
skill_dirs = ["~/.agents/skills", "~/.codex/skills"]
runtime_constructs = ["apply_patch", "codex apply", "codex/{feature}"]
# Codex does not expand references natively; the entry file must carry an
# explicit read-before-task instruction.
